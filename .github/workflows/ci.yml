name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime:
    name: Runtime foundation checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run repository hygiene checks
        shell: pwsh
        run: ./scripts/check-repo-hygiene.ps1

      - name: Run public brand checks
        shell: pwsh
        run: ./scripts/check-public-brand.ps1

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests

      - name: Validate Docker Compose
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=$/POSTGRES_PASSWORD=ci-placeholder/' .env
          sed -i 's/^SONIC_PASSWORD=$/SONIC_PASSWORD=ci-placeholder/' .env
          docker compose -f docker-compose.production.yml config >/tmp/bairui-compose.yml

      - name: Run smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1

      - name: Run commercial Go/No-Go dry-run
        shell: pwsh
        run: ./scripts/commercial-go-no-go.ps1 -OutputPath artifacts/commercial-go-no-go.json

      - name: Run server trial acceptance rehearsal
        run: |
          bash -n scripts/run-server-trial-acceptance.sh
          SKIP_DEPLOY=1 SKIP_SERVER_VERIFICATION=1 SKIP_POSTGRES=1 bash scripts/run-server-trial-acceptance.sh

      - name: Upload commercial Go/No-Go report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: commercial-go-no-go
          path: artifacts/commercial-go-no-go.json
          if-no-files-found: ignore
