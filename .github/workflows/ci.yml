name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  skeleton:
    name: Repository skeleton checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository hygiene checks
        shell: pwsh
        run: ./scripts/check-repo-hygiene.ps1

      - name: Validate Docker Compose skeleton
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=$/POSTGRES_PASSWORD=ci-placeholder/' .env
          docker compose -f docker-compose.production.yml config >/tmp/moxi-compose.yml

      - name: Run skeleton smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1
