services:
  postgres:
    image: postgres:16-alpine
    container_name: moxi-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moxi}
      POSTGRES_USER: ${POSTGRES_USER:-moxi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moxi} -d ${POSTGRES_DB:-moxi}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  hermes-placeholder:
    build: .
    container_name: moxi-hermes-placeholder
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./obsidian-vault:/opt/hermes-system/obsidian-vault
    restart: "no"
